<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details - Massage Clinic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <img src="logo.png" alt="Clinic Logo" class="logo">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="booking.html">New Booking</a>
                <a href="customers.html">Customers</a>
                <a href="dashboard.html">Earnings</a>
            </div>
        </nav>

        <header>
            <h1>Customer Details</h1>
            <p class="subtitle">View and edit customer information</p>
        </header>

        <section class="form-section">
            <div id="loadingMessage" style="text-align: center; padding: 40px; color: #8D6E63;">Loading customer details...</div>
            
            <form id="customerDetailForm" style="display: none;">
                <section class="form-section">
                    <h3>Personal Information</h3>
                    <div class="input-group">
                        <label for="customerName">Full Name</label>
                        <input type="text" id="customerName" required>
                    </div>
                    <div class="grid-inputs">
                        <div class="input-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <div class="input-group">
                            <label for="insurance">Insurance Card No.</label>
                            <input type="text" id="insurance" placeholder="Optional">
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h3>Booking Details</h3>
                    <div class="grid-inputs">
                        <div class="input-group">
                            <label for="appointmentDate">Appointment Date</label>
                            <input type="date" id="appointmentDate" required>
                        </div>
                        <div class="input-group">
                            <label for="appointmentTime">Start Time</label>
                            <input type="time" id="appointmentTime" required>
                        </div>
                    </div>
                    <div class="grid-inputs">
                        <div class="input-group">
                            <label for="therapyDuration">Therapy Duration (mins)</label>
                            <select id="therapyDuration" required>
                                <option value="">Select Duration</option>
                                <option value="10">10 mins</option>
                                <option value="20">20 mins</option>
                                <option value="30">30 mins</option>
                                <option value="40">40 mins</option>
                                <option value="45">45 mins</option>
                                <option value="60">60 mins</option>
                                <option value="90">90 mins</option>
                                <option value="120">120 mins</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="endTime">End Time</label>
                            <input type="time" id="endTime" readonly>
                        </div>
                    </div>
                    <div class="grid-inputs">
                        <div class="input-group">
                            <label for="therapist">Therapist</label>
                            <select id="therapist" required>
                                <option value="">Select Therapist</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="treatment">Treatment Type</label>
                            <select id="treatment" required>
                                <option value="">Select Treatment</option>
                                <option value="neck-shoulder">Neck & Shoulder</option>
                                <option value="whole-body">Whole Body</option>
                                <option value="remedial">Remedial Massage</option>
                                <option value="foot">Foot Massage</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h3>Payment Information</h3>
                    <div class="grid-inputs">
                        <div class="input-group">
                            <label for="totalPrice">Total Price ($)</label>
                            <input type="number" id="totalPrice" step="0.01" min="0" required>
                        </div>
                        <div class="input-group">
                            <label for="insuranceClaim">Insurance Claim ($)</label>
                            <input type="number" id="insuranceClaim" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="grid-inputs">
                        <div class="input-group">
                            <label for="gapPayment">Gap Payment ($)</label>
                            <input type="number" id="gapPayment" step="0.01" readonly>
                        </div>
                        <div class="input-group">
                            <label for="paymentMethod">Payment Method</label>
                            <select id="paymentMethod" required>
                                <option value="cash">Cash</option>
                                <option value="card">Card</option>
                                <option value="account">Account</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h3>Booking History</h3>
                    <div id="bookingHistory" style="max-height: 300px; overflow-y: auto; border: 1px solid #E0E0E0; border-radius: 10px; padding: 15px;">
                        <p style="color: #8D6E63;">Loading bookings...</p>
                    </div>
                </section>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="submit-btn">Save Changes</button>
                    <a href="customers.html" class="submit-btn" style="background-color: #8D6E63; text-align: center; text-decoration: none; cursor: pointer;">Back to Customers</a>
                </div>
            </form>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
