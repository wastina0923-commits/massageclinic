<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massage Clinic - Customer Records</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth-check.js"></script>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <img src="logo.png" alt="Clinic Logo" class="logo">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="booking.html">Register Client</a>
                <a href="customers.html" class="active">Customers</a>
                <a href="dashboard.html">Earnings</a>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
        </nav>

        <header>
            <h1>Customer Records</h1>
            <p class="subtitle">Search and view past treatment history.</p>
        </header>

        <section class="search-box">
            <input type="text" id="customerSearch" placeholder="Search by keywords...">
            <button class="filter-btn" id="searchBtn">Search</button>
        </section>

        <section class="table-container">
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Duration</th>
                        <th>Customer</th>
                        <th>Therapist</th>
                        <th>Treatment</th>
                        <th>Total</th>
                        <th>Insurance</th>
                        <th>Gap</th>
                        <th>Method</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    <!-- Data will be loaded from database -->
                </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
