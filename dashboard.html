<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massage Clinic - Financial Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth-check.js"></script>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <img src="logo.png" alt="Clinic Logo" class="logo">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="booking.html">Register Client</a>
                <a href="customers.html">Customers</a>
                <a href="dashboard.html" class="active">Earnings</a>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
        </nav>

        <header>
            <h1>Daily Earnings</h1>
            <p class="subtitle" id="dashboard-date">Financial summary for today</p>
        </header>

        <section class="summary-grid">
            <div class="summary-card highlight-card">
                <h3>Total Revenue</h3>
                <p class="amount" id="totalRevenue">$0.00</p>
                <small>Gross sales</small>
            </div>
            <div class="summary-card highlight-card">
                <h3>Total Gap (Cash/Card)</h3>
                <p class="amount" id="totalGap">$0.00</p>
                <small>Actual money received in-store</small>
            </div>
            <div class="summary-card highlight-card">
                <h3>Insurance Claims</h3>
                <p class="amount" id="totalInsurance">$0.00</p>
                <small>Medicare</small>
            </div>
        </section>

        <section class="staff-commissions">
            <h3>Therapist Payouts</h3>
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Therapist</th>
                        <th>Customers</th>
                        <th>Total Generated</th>
                        <th>Net Earnings</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="earningsTableBody">
                    <!-- Data will be loaded dynamically -->
                </tbody>
            </table>
        </section>

        <footer class="dashboard-footer">
            <button class="submit-btn" onclick="window.print()">Print Daily Report</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
