<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Massage Clinic System</title> <link rel="stylesheet" href="style.css">
    <script src="auth-check.js"></script>
</head>
<body>
    <div class="container">
        <nav class="navbar" aria-label="Main Navigation">
            <img src="logo.png" alt="Relieve Massage Clinic Logo" class="logo"> <div class="nav-links">
                <a href="index.html" class="active" aria-current="page">Home</a>
                <a href="booking.html">Register Client</a>
                <a href="customers.html">Customers</a>
                <a href="dashboard.html">Earnings</a>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
        </nav>

        <main id="main-content">
            <header class="dashboard-header">
                <h1 id="live-date">Loading date...</h1>
            </header>

            <section class="selection-area" aria-labelledby="assign-heading">
                <h2 id="assign-heading">Assign Therapist for Today</h2>
        
                <div class="controls">
                    <label for="therapist-select" class="visually-hidden">Select a therapist to add to today's shift</label>
                    <select id="therapist-select">
                        <option value="" disabled selected>Select a therapist...</option>
                        <option value="Alice">Alice</option>
                        <option value="Sunny">Sunny</option>
                        <option value="Helen">Helen</option>
                        <option value="Melody">Melody</option>
                        <option value="Jacky">Jacky</option>
                        <option value="Kelly">Kelly</option>
                        <option value="Olie">Olie</option>
                        <option value="Joanna">Joanna</option>
                        <option value="Coco">Coco</option>
                        <option value="Tina">Tina</option>
                    </select>
                    <button id="add-btn">Add to Shift</button>
                </div>

                <div id="selected-list" class="status-grid" aria-live="polite" aria-relevant="additions">
                    </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
