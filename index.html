<!DOCTYPE html>

    <title>Massage Clinic System - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <img src="logo.png" alt="Clinic Logo" class="logo">
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>

                    <option value="Joanna">Joanna</option>
                    <option value="Coco">Coco</option>

                </select>
                <button id="add-btn">Add to Shift</button>
                </div>

                <div id="selected-list" class="status-grid">
            </div>
        </section>
    </div>
    <script src="script.js"></script>
